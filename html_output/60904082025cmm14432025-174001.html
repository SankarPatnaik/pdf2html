<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    :root {
      --ink: #17130f;
      --paper: #fffdf8;
      --rule: #d8d1c3;
      --accent: #6d4c2f;
    }
    * { box-sizing: border-box; }
    html { background: #ece7df; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.6;
    }
    main {
      max-width: 980px;
      margin: 32px auto;
      padding: 40px 56px 72px;
      background: var(--paper);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
    }
    h1, h2, h3, h4 {
      font-weight: 700;
      line-height: 1.25;
      margin: 1.15em 0 0.45em;
    }
    h2 {
      font-size: 1.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    h3 {
      font-size: 1.12rem;
    }
    p {
      margin: 0.65em 0;
      text-align: justify;
    }
    .footnote {
      font-size: 0.9rem;
      line-height: 1.45;
      margin-top: 0.5em;
    }
    ol, ul {
      margin: 0.65em 0 0.95em 1.5em;
      padding: 0;
    }
    li {
      margin: 0.28em 0;
      padding-left: 0.2em;
    }
    .table-wrap {
      margin: 1.15em 0 1.45em;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--rule);
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid var(--rule);
      padding: 0.48rem 0.56rem;
      vertical-align: top;
    }
    th {
      background: #f6f1e8;
      text-align: left;
    }
    figure {
      margin: 1.3em 0 1.6em;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--rule);
      background: white;
    }
    @media print {
      html, body {
        background: white;
      }
      main {
        margin: 0;
        max-width: none;
        box-shadow: none;
        padding: 0;
      }
      figure, table, p, li {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main>
    <article>
<figure class="page-facsimile" data-page="1"><img src="assets/60904082025cmm14432025-174001/60904082025cmm14432025-174001-page-0001.png" alt="Facsimile of page 1" /></figure>
<p data-page="2">the learned First Appellate Court.</p>
<ol class="numbered-list" start="5">
<li>Pending applications also stand disposed of in aforesaid terms.</li>
</ol>
<p data-page="2">(MANOJ JAIN) JUDGE AUGUST 4, 2025/dr/js CM(M) 1443/2025 2</p>
    </article>
  </main>
</body>
</html>
